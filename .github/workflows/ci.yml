name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  python-smoke:
    name: Python smoke
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax-check Python helpers
        run: |
          python -c "import ast, pathlib; roots=('scripts','sim','hw/arty_a7_100t/python'); [ast.parse(p.read_text(encoding='utf-8'), filename=str(p)) for root in roots for p in pathlib.Path(root).rglob('*.py')]"

      - name: YUV spec test (model-side property gate)
        run: python hw/arty_a7_100t/python/check_yuv_spec.py

  fcapz-submodule:
    name: fcapz submodule RTL lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install iverilog
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends iverilog

      - name: Run fcapz RTL lint
        working-directory: fcapz
        run: python sim/run_sim.py --lint-only

  rtl-state-align:
    name: RTL state/AXIS alignment
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends iverilog

      - name: Run stateful-pattern alignment regression
        run: python sim/run_iverilog_state_align.py

  sim:
    name: Verilator simulation
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends verilator g++ python3

      - name: Lint
        run: python sim/run_sim.py lint

      - name: Regression (coverage + model gate, RGB 8bpc)
        run: python sim/run_sim.py regression

      - name: All modes (model vs sim byte-exact, 20 configs)
        run: python sim/run_sim.py all_modes

      - name: Sequential captures (RGB/RAW/YUV state-leakage gate)
        run: python sim/run_sim.py check_seq_modes

  cocotb:
    name: cocotb (AXI-Lite + AXIS handshake)
    runs-on: ubuntu-24.04
    # cocotb 2.0.1 + Verilator needs Verilator >= 5.030 because of
    # VerilatedVpi::clearEvalNeeded/doInertialPuts/evalNeeded APIs. The
    # apt verilator on ubuntu-24.04 is 5.020, so we build a tagged
    # Verilator release from source here. Build is cached on the
    # release tag so subsequent runs reuse it.
    env:
      VERILATOR_VERSION: v5.030

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps + cocotb
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git make g++ perl python3-dev autoconf flex bison libfl-dev \
            ccache help2man
          python -m pip install --upgrade pip
          python -m pip install cocotb==2.0.1

      - name: Cache Verilator build
        id: verilator-cache
        uses: actions/cache@v4
        with:
          path: /opt/verilator
          key: verilator-${{ env.VERILATOR_VERSION }}-ubuntu-24.04

      - name: Build Verilator from source
        if: steps.verilator-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch ${{ env.VERILATOR_VERSION }} \
            https://github.com/verilator/verilator.git /tmp/verilator
          cd /tmp/verilator
          autoconf
          ./configure --prefix=/opt/verilator
          make -j$(nproc)
          sudo make install

      - name: Run cocotb suites
        run: |
          export PATH=/opt/verilator/bin:$PATH
          verilator --version
          python sim/cocotb/run_cocotb.py
